<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Registro - EmpléateYA</title>
  <link rel="stylesheet" href="CSS/styles.css">
</head>
<body class="inicio">
  <div class="contenedor">
    <h1>Regístrate</h1>
    <p>Selecciona el tipo de cuenta y completa los datos</p>

<form id="formRegistro" class="formulario-registro">

  <input id="regNombre" type="text"
         placeholder="Nombre completo" required>

  <input id="regDocumento" type="number"
         placeholder="Número de documento" required>

  <input id="regEmail" type="email"
         placeholder="Correo electrónico" required>

  <input id="regPass" type="password"
         placeholder="Contraseña" required>

  <input id="regCiudad" type="text"
         placeholder="Ciudad" required>

  <textarea id="regExperiencia"
            placeholder="Describe tu experiencia laboral"
            rows="4"
            required></textarea>

  <button class="boton" type="submit">
    Crear cuenta
  </button>

</form>

    <p class="texto-login">¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a></p>
  </div>

  <script src="JS/auth.js"></script>
</body>
</html>
