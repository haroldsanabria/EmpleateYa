<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - EmpléateYA</title>
  <link rel="stylesheet" href="CSS/styles.css">
</head>
<body class="inicio">
  <div class="contenedor">
    <h1>Iniciar sesión</h1>
    <form id="formLogin" class="formulario-registro">
      <input id="loginEmail" type="email" placeholder="Correo" required>
      <input id="loginPass" type="password" placeholder="Contraseña" required>
      <button class="boton" type="submit">Entrar</button>
    </form>
    <p class="texto-login">¿No tienes cuenta? <a href="registro.html">Regístrate</a></p>
  </div>

  <script src="JS/auth.js"></script>
</body>
</html>
