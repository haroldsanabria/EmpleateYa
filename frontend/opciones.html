<!doctype html>
<html lang="es">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Opciones</title>
<link rel="stylesheet" href="CSS/styles.css"></head>
<body class="inicio">
  <div class="contenedor">
    <h1>Bienvenido</h1>
    <p>Redirigiendo a tu panel...</p>
  </div>

  <script>
    const user = JSON.parse(localStorage.getItem('empleateya_user'));
    if(!user) { window.location.href = 'index.html'; }
    else if(user.tipo === 'empresa') window.location.href = 'empresa.html';
    else window.location.href = 'usuario.html';
  </script>
</body>
</html>
