<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EmpléateYA - Inicio</title>
  <link rel="stylesheet" href="CSS/styles.css">
</head>
<body class="inicio">

  <!-- PANEL IZQUIERDO -->
  <div class="hero-left">
    <div class="hero-pill">✦ Plataforma de empleo</div>
    <p class="hero-empleate">Empleate</p>
    <p class="hero-ya">YA</p>
    <p class="hero-sub">Tu próximo trabajo está a un clic.<br>Conectamos talento con oportunidades reales.</p>
    <div class="hero-stats">
      <div class="hero-stat"><strong>2.4k+</strong><small>Vacantes activas</small></div>
      <div class="hero-stat"><strong>98%</strong><small>Tasa de éxito</small></div>
    </div>
  </div>

  <!-- PANEL DERECHO -->
  <div class="contenedor">
    <h1>EmpléateYA</h1>
    <p>¿Cómo deseas ingresar?</p>

    <div class="selector-tipo">
      <button type="button" class="tipo-card" id="btnUsuario" onclick="seleccionarTipo('usuario')">
        <span class="tipo-icono">👤</span>
        <span class="tipo-titulo">Usuario</span>
        <span class="tipo-desc">Busco empleo</span>
      </button>

      <button type="button" class="tipo-card" id="btnEmpresa" onclick="seleccionarTipo('empresa')">
        <span class="tipo-icono">🏢</span>
        <span class="tipo-titulo">Empresa</span>
        <span class="tipo-desc">Publico ofertas</span>
      </button>
    </div>

    <div style="display:flex;gap:12px;justify-content:center;margin-top:20px">
      <a class="boton" id="linkRegistro" href="registro.html">Registrarse</a>
      <a class="boton sec" id="linkLogin" href="login.html">Iniciar sesión</a>
    </div>
  </div>

  <script>
    function seleccionarTipo(tipo) {
      document.getElementById('btnUsuario').classList.toggle('activo', tipo === 'usuario');
      document.getElementById('btnEmpresa').classList.toggle('activo', tipo === 'empresa');

      const linkRegistro = document.getElementById('linkRegistro');
      const linkLogin = document.getElementById('linkLogin');

      if (tipo === 'empresa') {
        linkRegistro.href = 'registro.html?tipo=empresa';
        linkLogin.href = 'login.html?tipo=empresa';
      } else {
        linkRegistro.href = 'registro.html?tipo=usuario';
        linkLogin.href = 'login.html?tipo=usuario';
      }
    }

    // Selección por defecto
    seleccionarTipo('usuario');
  </script>

</body>
</html>
